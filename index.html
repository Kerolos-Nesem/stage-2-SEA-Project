<!doctype html>
<html>
  <head>
    <title>Personal Pokemon Cards Collection</title>
    <meta name="description" content="A Catalog of Shows Set in Los Angeles" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js" defer></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Pokemon Cards I Own</h1>
    </header>
    <div class="funcs">
      <input class = 'funcs' type="text" id="search-input" placeholder="Search by name" />
      <select class = 'funcs' id="sort-select">
        <option value="default">Sort By...</option>
        <option value="name-asc">Name (A-Z)</option>
        <option value="name-desc">Name (Z-A)</option>
        <option value="cost-asc">Cost (Low to High)</option>
        <option value="cost-desc">Cost (High to Low)</option>
      </select>
    </div>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <img src="" alt="Pokemon card" />
        <ul id="card-info">
        </ul>
      </div>
    </div>
    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
  </body>
</html>
